# Hand-crafted Anthropic-specific 529 Overloaded burst followed by a
# successful response. Tests the provider's exponential-backoff retry
# loop (_MAX_ANTHROPIC_ATTEMPTS=5). The disable_backoff_sleep fixture
# in tests/replay/conftest.py prevents the test from actually waiting
# the backoff intervals.
interactions:
  - request:
      body: null
      headers:
        Content-Type:
          - application/json
        User-Agent:
          - inqtrix/0.1
      method: POST
      uri: https://api.anthropic.com/v1/messages
    response:
      body:
        string: |
          {
            "type": "error",
            "error": {
              "type": "overloaded_error",
              "message": "Overloaded"
            }
          }
      headers:
        content-type:
          - application/json
        request-id:
          - "req-replay-overload-1"
      status:
        code: 529
        message: Overloaded
  - request:
      body: null
      headers:
        Content-Type:
          - application/json
        User-Agent:
          - inqtrix/0.1
      method: POST
      uri: https://api.anthropic.com/v1/messages
    response:
      body:
        string: |
          {
            "id": "msg_replay_529_recovered_001",
            "type": "message",
            "role": "assistant",
            "model": "claude-sonnet-4-6",
            "content": [
              {
                "type": "text",
                "text": "Antwort nach erfolgreichem Retry."
              }
            ],
            "stop_reason": "end_turn",
            "usage": {
              "input_tokens": 11,
              "output_tokens": 7
            }
          }
      headers:
        content-type:
          - application/json
      status:
        code: 200
        message: OK
version: 1
