# Hand-crafted 400 invalid_request_error — non-retryable, surfaced as
# AnthropicAPIError with structured request-id and error_type fields.
interactions:
  - request:
      body: null
      headers:
        Content-Type:
          - application/json
        User-Agent:
          - inqtrix/0.1
      method: POST
      uri: https://api.anthropic.com/v1/messages
    response:
      body:
        string: |
          {
            "type": "error",
            "error": {
              "type": "invalid_request_error",
              "message": "messages.0.content: Input cannot be empty"
            }
          }
      headers:
        content-type:
          - application/json
        request-id:
          - "req-replay-invalid-1"
      status:
        code: 400
        message: Bad Request
version: 1
