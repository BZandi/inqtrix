# Hand-crafted 429 from the Foundry-Bing Responses API.
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: https://test.services.ai.azure.com/api/projects/demo/openai/v1/responses
    response:
      body:
        string: |
          {
            "error": {
              "code": "RateLimitReached",
              "message": "Bing tool quota exceeded for the agent"
            }
          }
      headers:
        content-type:
          - application/json
        apim-request-id:
          - "req-afbing-replay-rl-1"
        retry-after:
          - "30"
      status:
        code: 429
        message: Too Many Requests
version: 1
