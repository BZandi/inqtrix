# Hand-crafted Azure OpenAI v1 chat-completions success response.
# Same JSON shape as plain OpenAI; the Azure-specific bits (deployment
# name, apim-request-id) live in the URL path and headers.
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: https://test-resource.openai.azure.com/openai/v1/chat/completions
    response:
      body:
        string: |
          {
            "id": "chatcmpl-azure-replay-001",
            "object": "chat.completion",
            "created": 1745001000,
            "model": "my-gpt4o-deployment",
            "choices": [
              {
                "index": 0,
                "message": {
                  "role": "assistant",
                  "content": "Azure OpenAI antwortet ueber den v1-Endpunkt mit deployment-name routing."
                },
                "finish_reason": "stop"
              }
            ],
            "usage": {
              "prompt_tokens": 9,
              "completion_tokens": 16,
              "total_tokens": 25
            }
          }
      headers:
        content-type:
          - application/json
        apim-request-id:
          - "req-azure-replay-success-1"
      status:
        code: 200
        message: OK
version: 1
