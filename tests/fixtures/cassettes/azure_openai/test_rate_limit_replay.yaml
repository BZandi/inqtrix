# Hand-crafted 429 from Azure OpenAI.  Real Azure responses include
# error_code + structured error body; the provider must translate them
# via extract_azure_api_error_details into AzureOpenAIAPIError details
# (or AgentRateLimited for 429).
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: https://test-resource.openai.azure.com/openai/v1/chat/completions
    response:
      body:
        string: |
          {
            "error": {
              "code": "RateLimitReached",
              "message": "Requests to the OpenAI API have exceeded the per-minute limit"
            }
          }
      headers:
        content-type:
          - application/json
        apim-request-id:
          - "req-azure-replay-rl-1"
        retry-after:
          - "30"
      status:
        code: 429
        message: Too Many Requests
version: 1
