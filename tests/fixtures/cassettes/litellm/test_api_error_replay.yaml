# Hand-crafted 500 server error. Single interaction, max_retries=0 in
# the test so we test the OpenAIError pass-through path explicitly.
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: http://localhost:4000/v1/chat/completions
    response:
      body:
        string: |
          {
            "error": {
              "type": "internal_server_error",
              "message": "Upstream model dispatch failed"
            }
          }
      headers:
        content-type:
          - application/json
      status:
        code: 500
        message: Internal Server Error
version: 1
