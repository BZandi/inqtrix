# Hand-crafted 429 from a LiteLLM proxy. Single interaction because the
# test sets client.max_retries=0 to keep the cassette focused on the
# error-translation path (OpenAI SDK -> AgentRateLimited).
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: http://localhost:4000/v1/chat/completions
    response:
      body:
        string: |
          {
            "error": {
              "type": "rate_limit_error",
              "message": "Rate limit reached for gpt-4o on tokens-per-minute"
            }
          }
      headers:
        content-type:
          - application/json
        retry-after:
          - "30"
      status:
        code: 429
        message: Too Many Requests
version: 1
