# Hand-crafted 502 Bad Gateway. Perplexity should NOT raise here —
# the provider's APIStatusError branch returns the empty-result dict
# and stores a nonfatal notice. The replay test asserts both.
interactions:
  - request:
      body: null
      headers:
        accept:
          - application/json
        content-type:
          - application/json
      method: POST
      uri: http://localhost:4000/v1/chat/completions
    response:
      body:
        string: |
          {
            "error": {
              "type": "bad_gateway",
              "message": "Upstream Sonar dispatch failed"
            }
          }
      headers:
        content-type:
          - application/json
      status:
        code: 502
        message: Bad Gateway
version: 1
